<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1b2e"/>
    </radialGradient>
    <radialGradient id="crossGrad" cx="50%" cy="45%" r="55%" gradientUnits="userSpaceOnUse" fx="512" fy="460">
      <stop offset="0%" stop-color="#ddeeff"/>
      <stop offset="50%" stop-color="#b8d4ee"/>
      <stop offset="100%" stop-color="#7aaad4"/>
    </radialGradient>
    <radialGradient id="innerCrossGlow" cx="50%" cy="42%" r="30%" gradientUnits="userSpaceOnUse" fx="512" fy="430">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="crossGlow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="crossClip">
      <rect x="312" y="112" width="400" height="800" rx="40"/>
      <rect x="112" y="312" width="800" height="400" rx="40"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bgGrad)"/>

  <!-- Subtle circle -->
  <circle cx="512" cy="512" r="430" fill="none" stroke="#a8c5e8" stroke-width="2" stroke-opacity="0.15"/>

  <!-- Medical cross with radial gradient and glow -->
  <g filter="url(#crossGlow)">
    <rect x="112" y="112" width="800" height="800" fill="url(#crossGrad)" clip-path="url(#crossClip)"/>
  </g>

  <!-- White Latin cross with glow -->
  <g filter="url(#innerGlow)">
    <!-- Vertical bar -->
    <rect x="490" y="300" width="44" height="500" rx="10" fill="url(#innerCrossGlow)"/>
    <!-- Horizontal bar -->
    <rect x="356" y="420" width="312" height="44" rx="10" fill="url(#innerCrossGlow)"/>
  </g>
</svg>
