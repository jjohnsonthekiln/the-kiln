<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Come to Me — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0D1B2A; --navy-2: #162032; --navy-3: #1E2D40;
  --gold: #C9A96E; --gold-dim: #7a6b4a;
  --cream: #EDE0C4; --cream-dim: #b5a98a;
  --border: rgba(201,169,110,0.15);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Lato', sans-serif;
}
html, body { height: 100%; background: var(--navy); color: var(--cream); font-family: var(--sans); font-weight: 300; -webkit-font-smoothing: antialiased; }
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.login-card { background: var(--navy-2); border: 0.5px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 360px; text-align: center; }
.login-card h1 { font-family: var(--serif); font-weight: 300; font-size: 28px; color: var(--gold); margin-bottom: 6px; }
.login-card p { font-size: 13px; color: var(--gold-dim); margin-bottom: 28px; }
.login-card input { width: 100%; background: var(--navy-3); border: 0.5px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--cream); font-family: var(--sans); font-size: 15px; outline: none; margin-bottom: 14px; }
.login-card input:focus { border-color: rgba(201,169,110,0.4); }
.btn { background: var(--gold); color: var(--navy); border: none; border-radius: 8px; padding: 12px 24px; font-family: var(--sans); font-size: 14px; font-weight: 400; cursor: pointer; width: 100%; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.err-msg { font-size: 13px; color: #d07070; margin-top: 10px; }
#app { display: none; min-height: 100vh; }
header { background: var(--navy-2); border-bottom: 0.5px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-family: var(--serif); font-weight: 300; font-size: 22px; color: var(--gold); }
.logout-btn { background: none; border: 0.5px solid var(--border); border-radius: 6px; color: var(--gold-dim); padding: 6px 12px; font-size: 12px; cursor: pointer; }
.logout-btn:hover { color: var(--gold); border-color: var(--gold); }
#stats-bar { display: flex; gap: 16px; padding: 16px 24px; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; }
.stat { background: var(--navy-2); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 18px; }
.stat-val { font-family: var(--serif); font-size: 26px; color: var(--gold); line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--gold-dim); margin-top: 3px; }
#filters { display: flex; gap: 10px; padding: 14px 24px; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; align-items: center; }
#filters select, #filters input[type=date] { background: var(--navy-2); border: 0.5px solid var(--border); border-radius: 8px; color: var(--cream); font-family: var(--sans); font-size: 13px; padding: 7px 10px; outline: none; cursor: pointer; }
.filter-btn { background: var(--navy-3); border: 0.5px solid var(--border); border-radius: 8px; color: var(--gold); padding: 7px 16px; font-size: 13px; cursor: pointer; }
.filter-btn:hover { border-color: var(--gold); }
#main { display: flex; height: calc(100vh - 170px); }
#session-list { width: 300px; flex-shrink: 0; border-right: 0.5px solid var(--border); overflow-y: auto; }
#conversation-view { flex: 1; overflow-y: auto; padding: 20px 24px; }
.session-item { padding: 14px 16px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.1s; }
.session-item:hover { background: var(--navy-2); }
.session-item.active { background: var(--navy-3); border-left: 2px solid var(--gold); }
.s-id { font-size: 11px; color: var(--gold-dim); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.s-meta { display: flex; justify-content: space-between; margin-top: 4px; }
.s-lang { font-size: 12px; color: var(--gold); }
.s-date { font-size: 11px; color: var(--cream-dim); }
.load-more { padding: 14px; text-align: center; cursor: pointer; font-size: 13px; color: var(--gold-dim); }
.load-more:hover { color: var(--gold); }
#conversation-view .placeholder { text-align: center; color: var(--gold-dim); font-family: var(--serif); font-size: 18px; margin-top: 60px; }
.conv-header { margin-bottom: 20px; padding-bottom: 14px; border-bottom: 0.5px solid var(--border); }
.conv-header h2 { font-family: var(--serif); font-weight: 300; font-size: 20px; color: var(--gold); }
.conv-header p { font-size: 12px; color: var(--gold-dim); margin-top: 4px; }
.message { margin-bottom: 16px; }
.msg-label { font-size: 11px; color: var(--gold-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.msg-bubble { padding: 12px 16px; border-radius: 10px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
.msg-bubble.user { background: var(--navy-3); border: 0.5px solid var(--border); color: var(--cream); }
.msg-bubble.ai { background: #F0E8D4; color: #1C1812; }
.loading { text-align: center; color: var(--gold-dim); padding: 40px; font-size: 14px; }
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <h1>Come to Me</h1>
    <p>Admin — Conversation Viewer</p>
    <input type="password" id="pw-input" placeholder="Password" />
    <button class="btn" id="login-btn">Sign In</button>
    <div class="err-msg" id="login-err"></div>
  </div>
</div>
<div id="app">
  <header>
    <h1>Conversation Viewer</h1>
    <button class="logout-btn" id="logout-btn">Sign Out</button>
  </header>
  <div id="stats-bar"></div>
  <div id="filters">
    <select id="lang-filter">
      <option value="">All Languages</option>
      <option value="en">English</option>
      <option value="es">Español</option>
      <option value="it">Italiano</option>
      <option value="pt">Português</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="zh">中文</option>
      <option value="ar">العربية</option>
      <option value="hi">हिन्दी</option>
      <option value="ru">Русский</option>
    </select>
    <input type="date" id="date-from" />
    <input type="date" id="date-to" />
    <button class="filter-btn" id="apply-filter">Apply</button>
    <button class="filter-btn" id="clear-filter">Clear</button>
  </div>
  <div id="main">
    <div id="session-list"></div>
    <div id="conversation-view"><p class="placeholder">Select a session to view</p></div>
  </div>
</div>
<script>
'use strict';
// ── CONFIG ─────────────────────────────────────────────────────────────────
const SUPABASE_URL      = 'https://oslenfkfrpfxqjqneyrf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zbGVuZmtmcnBmeHFqcW5leXJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MTQyOTYsImV4cCI6MjA5MTA5MDI5Nn0.2Emc8vZ57YgRIA0gbppZzISxFewJB0duZezpIikshUk';
const ADMIN_PASSWORD    = 'kiln2026';
// ──────────────────────────────────────────────────────────────────────────
const SB_HEADERS = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' };
let offset = 0; const LIMIT = 30; let currentFilters = {};
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('login-btn').addEventListener('click', login);
document.getElementById('logout-btn').addEventListener('click', () => {
  offset = 0;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
});
function login() {
  const pw = document.getElementById('pw-input').value.trim();
  if (pw !== ADMIN_PASSWORD) { document.getElementById('login-err').textContent = 'Incorrect password.'; return; }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadStats(); loadSessions(true);
}
async function loadStats() {
  const [totalRes, langRes] = await Promise.all([
    sbFetch(`/rest/v1/conversations?select=id`, { 'Prefer': 'count=exact', 'Range': '0-0' }),
    sbFetch(`/rest/v1/conversations?select=lang`),
  ]);
  const total = totalRes.headers.get('content-range')?.split('/')[1] ?? '?';
  const langData = await langRes.json();
  const langCounts = langData.reduce((acc, r) => { acc[r.lang] = (acc[r.lang] || 0) + 1; return acc; }, {});
  const langs = Object.entries(langCounts).sort((a,b) => b[1]-a[1]).slice(0,6).map(([l,c]) => `${l.toUpperCase()}: ${c}`).join(' · ');
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Total Messages</div></div>
    <div class="stat"><div class="stat-val" style="font-size:14px;padding-top:6px;">${langs||'—'}</div><div class="stat-lbl">By Language</div></div>`;
}
document.getElementById('apply-filter').addEventListener('click', () => {
  currentFilters = { lang: document.getElementById('lang-filter').value||null, date_from: document.getElementById('date-from').value||null, date_to: document.getElementById('date-to').value||null };
  loadSessions(true);
});
document.getElementById('clear-filter').addEventListener('click', () => {
  document.getElementById('lang-filter').value=''; document.getElementById('date-from').value=''; document.getElementById('date-to').value='';
  currentFilters={}; loadSessions(true);
});
async function loadSessions(reset=false) {
  if (reset) { offset=0; document.getElementById('session-list').innerHTML='<div class="loading">Loading…</div>'; }
  let url=`/rest/v1/conversations?select=session_id,lang,created_at&order=created_at.desc&limit=${LIMIT}&offset=${offset}`;
  if (currentFilters.lang) url+=`&lang=eq.${currentFilters.lang}`;
  if (currentFilters.date_from) url+=`&created_at=gte.${currentFilters.date_from}`;
  if (currentFilters.date_to) url+=`&created_at=lte.${currentFilters.date_to}T23:59:59`;
  const res=await sbFetch(url); const data=await res.json();
  offset+=data.length;
  const list=document.getElementById('session-list');
  if(reset) list.innerHTML='';
  const seen=new Set();
  data.filter(r=>{ if(seen.has(r.session_id)) return false; seen.add(r.session_id); return true; }).forEach(s=>{
    const el=document.createElement('div'); el.className='session-item'; el.dataset.id=s.session_id;
    el.innerHTML=`<div class="s-id">${s.session_id}</div><div class="s-meta"><span class="s-lang">${(s.lang||'').toUpperCase()}</span><span class="s-date">${new Date(s.created_at).toLocaleDateString()}</span></div>`;
    el.addEventListener('click',()=>loadMessages(s.session_id,s.lang,s.created_at,el));
    list.appendChild(el);
  });
  if(data.length===LIMIT){ const more=document.createElement('div'); more.className='load-more'; more.textContent='Load more…'; more.addEventListener('click',()=>{more.remove();loadSessions(false);}); list.appendChild(more); }
}
async function loadMessages(session_id,lang,date,el) {
  document.querySelectorAll('.session-item').forEach(e=>e.classList.remove('active')); el.classList.add('active');
  const view=document.getElementById('conversation-view');
  view.innerHTML='<div class="loading">Loading…</div>';
  const res=await sbFetch(`/rest/v1/conversations?session_id=eq.${session_id}&order=turn.asc&select=*`);
  const msgs=await res.json();
  view.innerHTML=`<div class="conv-header"><h2>Session — ${(lang||'').toUpperCase()}</h2><p>${new Date(date).toLocaleString()} · ${msgs.length} turn(s) · ID: ${session_id}</p></div>`;
  msgs.forEach(m=>{ view.innerHTML+=`<div class="message"><div class="msg-label">Visitor</div><div class="msg-bubble user">${escHtml(m.user_message)}</div></div><div class="message"><div class="msg-label">Come to Me</div><div class="msg-bubble ai">${escHtml(m.ai_response)}</div></div>`; });
}
function sbFetch(path,extraHeaders={}) { return fetch(`${SUPABASE_URL}${path}`,{headers:{...SB_HEADERS,...extraHeaders}}); }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
